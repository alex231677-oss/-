<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>大三元農場 — 原物料叫料統計系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────
   FONT SCALING: set font-size on <html>
   ALL sizes use rem so they scale together
───────────────────────────────────── */
html { font-size: 15px; scroll-behavior: smooth; }

/* ── THEMES ── */
:root {
  --green:#22c55e; --green-glow:rgba(34,197,94,0.18);
  --amber:#f59e0b; --red:#ef4444; --cyan:#06b6d4;
  --r:7px; --rl:11px;
}
body.theme-dark   { --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#202020;--sf:#1a1a1a;--bd:#2e2e2e;--bd2:#3a3a3a;--tx:#e8e8e8;--tx2:#a0a0a0;--tx3:#606060;--hbg:rgba(10,10,10,.96);--ttl:#fff;--ibg:#111; }
body.theme-forest { --bg:#0b1a0d;--bg2:#0f2012;--bg3:#132616;--bg4:#172d1b;--sf:#162c1a;--bd:#234d29;--bd2:#2e6334;--tx:#d4f0d8;--tx2:#8abf8e;--tx3:#4a7a4f;--hbg:rgba(11,26,13,.97);--ttl:#d4f0d8;--ibg:#0f2012; }
body.theme-navy   { --bg:#090d18;--bg2:#0d1220;--bg3:#111828;--bg4:#151e30;--sf:#111828;--bd:#1e2d4a;--bd2:#273c60;--tx:#c8d8f8;--tx2:#7a9ad0;--tx3:#3d5a8a;--hbg:rgba(9,13,24,.97);--ttl:#c8d8f8;--ibg:#0d1220; }
body.theme-warm   { --bg:#120e09;--bg2:#1a1510;--bg3:#221b14;--bg4:#2a2118;--sf:#221b14;--bd:#3d3020;--bd2:#50402a;--tx:#f0e0c8;--tx2:#b89870;--tx3:#6a5030;--hbg:rgba(18,14,9,.97);--ttl:#f0e0c8;--ibg:#1a1510; }
body.theme-light  { --bg:#f2f5f8;--bg2:#e8ecf0;--bg3:#dde2e8;--bg4:#d0d6de;--sf:#fff;--bd:#c8d0da;--bd2:#b0bac8;--tx:#1a2030;--tx2:#4a5568;--tx3:#8090a8;--hbg:rgba(242,245,248,.97);--ttl:#1a2030;--ibg:#f2f5f8; }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Noto Sans TC',sans-serif;
  font-size:1rem;
  background:var(--bg);
  color:var(--tx);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .3s,color .3s;
  padding-bottom:env(safe-area-inset-bottom);
}

/* ── HEADER ── */
header {
  position:sticky;top:0;z-index:200;
  background:var(--hbg);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bd);
  padding:0 1.4rem;height:3.8rem;
  display:flex;align-items:center;gap:.9rem;
}
.logo { display:flex;align-items:center;gap:.7rem;font-family:'Noto Serif TC',serif; }
.logo-mark {
  width:2.6rem;height:2.6rem;
  border:1.5px solid var(--green);border-radius:.5rem;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px var(--green-glow);
  background:rgba(34,197,94,.06);flex-shrink:0;
}
.logo-mark svg { width:1.75rem;height:1.75rem; }
.logo-name { font-size:1.15rem;font-weight:900;letter-spacing:.1em;color:var(--ttl); }
.logo-sub  { font-size:.6rem;color:var(--tx3);font-family:'JetBrains Mono',monospace;letter-spacing:.08em;margin-top:.1rem; }
.hdr-right { margin-left:auto;display:flex;align-items:center;gap:.65rem; }
.live-dot  { width:.42rem;height:.42rem;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.25} }
#clock { font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--tx3); }

/* ── SETTINGS BAR ── */
.settings-bar {
  background:var(--bg2);border-bottom:1px solid var(--bd);
  padding:.38rem 1.4rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
}
.s-lbl { font-size:.68rem;color:var(--tx3);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;white-space:nowrap; }
.font-btns { display:flex;gap:.25rem; }
.font-btn {
  height:1.7rem;padding:0 .55rem;border-radius:.4rem;
  border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);
  cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.font-btn:hover { border-color:var(--green);color:var(--green); }
.font-lbl { font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--tx3);min-width:2rem;text-align:center; }
.s-div { width:1px;height:1.1rem;background:var(--bd);margin:0 .25rem; }
.swatches { display:flex;gap:.35rem;align-items:center; }
.swatch {
  width:1.35rem;height:1.35rem;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .18s;
}
.swatch:hover { transform:scale(1.18); }
.swatch.active { border-color:var(--green);outline:2px solid var(--bg2);outline-offset:1px; }
.sw-dark   { background:radial-gradient(circle at 38% 38%,#333,#111); }
.sw-forest { background:radial-gradient(circle at 38% 38%,#22c55e,#0b1a0d); }
.sw-navy   { background:radial-gradient(circle at 38% 38%,#3b82f6,#090d18); }
.sw-warm   { background:radial-gradient(circle at 38% 38%,#f59e0b,#120e09); }
.sw-light  { background:radial-gradient(circle at 38% 38%,#fff,#c8d0da); }
#theme-lbl { font-size:.65rem;color:var(--tx3);font-family:'JetBrains Mono',monospace; }

/* ── NAV ── */
nav {
  background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;padding:0 1.4rem;gap:.1rem;
  position:sticky;top:3.8rem;z-index:100;
}
.tab-btn {
  padding:.6rem 1.2rem;border:none;background:none;
  font-family:'Noto Sans TC',sans-serif;font-size:.86rem;font-weight:500;
  color:var(--tx3);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .2s;display:flex;align-items:center;gap:.4rem;
}
.tab-btn:hover { color:var(--tx2); }
.tab-btn.active { color:var(--green);border-bottom-color:var(--green);font-weight:700; }

/* ── MAIN ── */
main { padding:1.2rem 1.4rem;max-width:1500px;margin:0 auto; }
.panel { display:none;animation:fadeIn .22s ease; }
.panel.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.sec-hdr { display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid var(--bd); }
.sec-title { font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:700;color:var(--ttl);letter-spacing:.04em; }
.sec-line { width:3px;height:1.1rem;border-radius:2px;background:var(--green);box-shadow:0 0 8px var(--green); }

/* ── STAT CARDS ── */
.cards-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(10rem,1fr));gap:.65rem;margin-bottom:1.1rem; }
.card {
  background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);
  padding:.95rem .85rem;transition:border-color .2s,transform .15s;
  position:relative;overflow:hidden;
}
.card::before { content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.025),transparent 60%);pointer-events:none; }
.card:hover { border-color:var(--bd2);transform:translateY(-1px); }
.card.cg { border-color:rgba(34,197,94,.3); }
.card.ca { border-color:rgba(245,158,11,.3); }
.card.cr { border-color:rgba(239,68,68,.3); }
.card-lbl { font-size:.66rem;color:var(--tx3);margin-bottom:.4rem;letter-spacing:.05em;font-family:'JetBrains Mono',monospace; }
.card-val { font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:600;color:var(--ttl);line-height:1; }
.card-val.g { color:var(--green); }
.card-val.a { color:var(--amber); }
.card-val.r { color:var(--red); }
.card-val.c { color:var(--cyan); }
.cu { font-size:.68rem;color:var(--tx3);margin-left:.2rem; }
.card-sub { font-size:.64rem;color:var(--tx3);margin-top:.28rem;font-family:'JetBrains Mono',monospace; }

/* ── INV PANEL ── */
.inv-panel { background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden; }
.inv-head { background:var(--bg3);padding:.55rem 1rem;font-size:.68rem;color:var(--tx3);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;border-bottom:1px solid var(--bd); }
.inv-row { display:flex;align-items:center;gap:.8rem;padding:.62rem 1rem;border-bottom:1px solid var(--bd);transition:background .12s; }
.inv-row:last-child { border-bottom:none; }
.inv-row:hover { background:var(--bg3); }
.inv-name { width:6.5rem;font-size:.86rem;font-weight:500;color:var(--tx); }
.inv-bar-wrap { flex:1; }
.inv-bar-bg { width:100%;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden; }
.inv-bar-fill { height:100%;border-radius:2px;transition:width .6s ease; }
.fg { background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.5); }
.fa { background:var(--amber); }
.fr { background:var(--red); }
.inv-nums { width:12rem;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--tx2);display:flex;align-items:center;justify-content:flex-end;gap:.6rem; }

/* ── BADGE ── */
.bdg { display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:.66rem;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap; }
.bdg-g { background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25); }
.bdg-a { background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25); }
.bdg-r { background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25); }
.bdg-c { background:rgba(6,182,212,.12);color:var(--cyan);border:1px solid rgba(6,182,212,.25); }

/* ── TABLE ── */
.table-wrap { background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:auto;margin-bottom:.85rem; }
table { width:100%;border-collapse:collapse;min-width:700px; }
thead tr { background:var(--bg3); }
thead th {
  padding:.52rem .75rem;text-align:left;
  font-size:.66rem;font-weight:600;color:var(--tx3);
  letter-spacing:.07em;font-family:'JetBrains Mono',monospace;
  border-bottom:1px solid var(--bd);white-space:nowrap;text-transform:uppercase;
}
tbody tr { border-bottom:1px solid rgba(128,128,128,.06);transition:background .1s; }
tbody tr:hover { background:var(--bg3); }
tbody tr:last-child { border-bottom:none; }
tbody td { padding:.45rem .75rem;font-size:.86rem;color:var(--tx);vertical-align:middle; }
tbody td.mn { font-family:'JetBrains Mono',monospace;font-size:.8rem; }

/* ── TOOLBAR ── */
.toolbar { display:flex;align-items:center;gap:.6rem;margin-bottom:.85rem;flex-wrap:wrap; }
.toolbar-right { margin-left:auto;display:flex;gap:.5rem; }
.search-input {
  padding:.42rem .75rem;background:var(--bg3);border:1px solid var(--bd);
  border-radius:var(--r);color:var(--tx);
  font-family:'Noto Sans TC',sans-serif;font-size:.82rem;
  outline:none;transition:border-color .15s;width:11rem;
}
.search-input:focus { border-color:var(--green); }
.search-input::placeholder { color:var(--tx3); }

/* ── BUTTONS ── */
.btn { display:inline-flex;align-items:center;gap:.4rem;padding:.42rem .85rem;border-radius:var(--r);border:none;font-family:'Noto Sans TC',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap; }
.btn-p { background:var(--green);color:#000;font-weight:700; }
.btn-p:hover { filter:brightness(1.1);box-shadow:0 0 12px var(--green-glow); }
.btn-g { background:var(--bg3);color:var(--tx2);border:1px solid var(--bd); }
.btn-g:hover { background:var(--bg4);color:var(--tx); }
.btn-d { background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2); }
.btn-d:hover { background:rgba(239,68,68,.2); }
.btn-sm { padding:.22rem .65rem;font-size:.74rem; }

/* ── FLOW BANNER ── */
.flow-banner {
  background:linear-gradient(90deg,rgba(6,182,212,.07),rgba(34,197,94,.07));
  border:1px solid var(--bd);border-radius:var(--rl);
  padding:.65rem 1rem;margin-bottom:.85rem;
  display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;
  font-size:.8rem;color:var(--tx2);
}
.flow-tag { padding:.25rem .75rem;border-radius:20px;font-size:.68rem;font-weight:600;font-family:'JetBrains Mono',monospace; }
.ft-src { background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.3); }
.ft-dst { background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.3); }
.flow-stats { margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.72rem;display:flex;gap:1.1rem; }
.fsv { font-size:.95rem;font-weight:600;color:var(--ttl); }
.fsl { color:var(--tx3);font-size:.62rem; }

/* ── REMAIN ── */
.rem { display:inline-flex;align-items:center;padding:2px .65rem;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600; }
.rem-ok   { background:rgba(34,197,94,.12);color:var(--green); }
.rem-warn { background:rgba(245,158,11,.12);color:var(--amber); }
.rem-zero { background:rgba(239,68,68,.12);color:var(--red); }

/* ── MODAL ── */
.modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px); }
.modal-overlay.show { display:flex; }
.modal { background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rl);padding:1.5rem 1.65rem;width:33rem;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.55);max-height:92vh;overflow-y:auto;animation:mIn .2s ease; }
@keyframes mIn { from{opacity:0;transform:scale(.97) translateY(-8px)} to{opacity:1;transform:none} }
.modal-title { font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:700;color:var(--ttl);margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.5rem; }
.form-grid { display:grid;grid-template-columns:1fr 1fr;gap:.72rem; }
.form-group { display:flex;flex-direction:column;gap:.3rem; }
.form-group.full { grid-column:1/-1; }
label { font-size:.68rem;color:var(--tx3);font-weight:500;letter-spacing:.05em;font-family:'JetBrains Mono',monospace; }
input,select,textarea { padding:.48rem .7rem;background:var(--ibg);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:.86rem;outline:none;transition:border-color .15s; }
input:focus,select:focus { border-color:var(--green); }
select option { background:var(--bg3); }
.modal-actions { display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem; }

/* ── PROG BAR ── */
.prog-bar { width:100%;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden; }
.prog-fill { height:100%;border-radius:2px; }

.empty-state { text-align:center;padding:2.2rem;color:var(--tx3);font-size:.82rem; }
.empty-icon  { font-size:2rem;margin-bottom:.6rem;opacity:.3; }

@media(max-width:640px){
  /* ── 基礎 ── */
  html { font-size: 14px; }
  main { padding:.6rem .5rem; }

  /* ── Header ── */
  header { padding:0 .75rem; height:3.2rem; gap:.5rem; }
  .logo-name { font-size:1rem; letter-spacing:.05em; }
  .logo-sub { display:none; }
  .logo-mark { width:2.2rem; height:2.2rem; }
  .logo-mark svg { width:1.5rem; height:1.5rem; }
  #clock { font-size:.6rem; }

  /* ── Settings bar ── */
  .settings-bar { padding:.4rem .5rem; gap:.4rem; }
  .s-lbl { font-size:.62rem; }
  .font-btn { height:2rem; padding:0 .6rem; font-size:.8rem; }
  .swatch { width:1.6rem; height:1.6rem; }
  #theme-lbl { display:none; }

  /* ── Nav 分頁 ── */
  nav {
    padding:0;
    top:3.2rem;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  nav::-webkit-scrollbar { display:none; }
  .tab-btn {
    padding:.7rem .85rem;
    font-size:.8rem;
    white-space:nowrap;
    flex-shrink:0;
    min-height:2.8rem; /* 手指易點 */
  }

  /* ── Cards ── */
  .cards-grid { grid-template-columns:1fr 1fr; gap:.5rem; }
  .card { padding:.75rem .65rem; }
  .card-val { font-size:1.5rem; }

  /* ── 表格：可橫向滑動 ── */
  .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:var(--r); }
  table { min-width:600px; }
  thead th { padding:.5rem .6rem; font-size:.62rem; }
  tbody td { padding:.5rem .6rem; font-size:.82rem; }

  /* ── Toolbar ── */
  .toolbar { gap:.4rem; }
  .toolbar-right { margin-left:0; width:100%; }
  .search-input { width:100%; font-size:.9rem; padding:.55rem .75rem; }
  .btn { padding:.55rem .85rem; font-size:.85rem; min-height:2.4rem; }
  .btn-sm { padding:.4rem .65rem; font-size:.78rem; min-height:2rem; }

  /* ── Modal ── */
  .modal {
    width:100%;
    max-width:100vw;
    margin:0;
    border-radius:var(--rl) var(--rl) 0 0;
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    max-height:92vh;
    padding:1.2rem 1rem 2rem;
  }
  .modal-overlay { align-items:flex-end; }
  .form-grid { grid-template-columns:1fr; gap:.6rem; }
  input, select, textarea {
    font-size:16px; /* 防止 iOS 自動縮放 */
    padding:.6rem .75rem;
    min-height:2.6rem;
  }
  .modal-actions { gap:.5rem; }
  .modal-actions .btn { flex:1; justify-content:center; min-height:2.8rem; font-size:.9rem; }

  /* ── Flow banner ── */
  .flow-banner { flex-direction:column; gap:.4rem; padding:.5rem .75rem; }
  .flow-stats { margin-left:0; gap:.75rem; }

  /* ── Inventory list ── */
  .inv-name { width:5rem; font-size:.82rem; }
  .inv-nums { width:auto; font-size:.72rem; }

  /* ── Section header ── */
  .sec-hdr { margin-bottom:.75rem; padding-bottom:.6rem; }
  .sec-title { font-size:.95rem; }
}

/* ── 極小螢幕 (iPhone SE 等) ── */
@media(max-width:375px){
  html { font-size:13px; }
  .tab-btn { padding:.7rem .65rem; font-size:.75rem; }
}
</style>
</head>
<body class="theme-dark">

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="lg-cap" cx="42%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#fb923c"/>
            <stop offset="55%" stop-color="#dc2626"/>
            <stop offset="100%" stop-color="#991b1b"/>
          </radialGradient>
          <radialGradient id="lg-shine" cx="40%" cy="25%" r="55%">
            <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- stem -->
        <rect x="20" y="30" width="12" height="17" rx="4" fill="#fde68a"/>
        <rect x="22" y="30" width="3" height="17" rx="1.5" fill="#fbbf24" opacity="0.45"/>
        <!-- gill lines on stem -->
        <line x1="22" y1="32" x2="22" y2="46" stroke="#d97706" stroke-width="0.9" opacity="0.55"/>
        <line x1="26" y1="30" x2="26" y2="47" stroke="#d97706" stroke-width="0.9" opacity="0.55"/>
        <line x1="30" y1="32" x2="30" y2="46" stroke="#d97706" stroke-width="0.9" opacity="0.55"/>
        <!-- cap -->
        <path d="M4 31 C4 16 11 6 26 6 C41 6 48 16 48 31 Z" fill="url(#lg-cap)"/>
        <path d="M4 31 C4 16 11 6 26 6 C41 6 48 16 48 31 Z" fill="url(#lg-shine)"/>
        <!-- shadow on cap left -->
        <path d="M4 31 C4 16 11 6 26 6 C18 6 8 16 8 31 Z" fill="#991b1b" opacity="0.35"/>
        <!-- white spots -->
        <circle cx="16" cy="19" r="4"   fill="white" opacity="0.85"/>
        <circle cx="32" cy="14" r="2.8" fill="white" opacity="0.80"/>

<script>
// ══ FONT SIZE — key fix: set on <html> element so rem units cascade ══
let fontSize = 15;
function changeFont(d) {
  if (d === 0) fontSize = 15;
  else fontSize = Math.min(22, Math.max(11, fontSize + d));
  document.documentElement.style.fontSize = fontSize + 'px'; // <-- html element
  document.getElementById('font-lbl').textContent = fontSize + 'px';
}

// ══ THEME ══
const themeNames = { dark:'深黑', forest:'森林綠', navy:'深藍', warm:'暖棕', light:'明亮' };
function setTheme(name, el) {
  document.body.className = 'theme-' + name;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('theme-lbl').textContent = themeNames[name] || name;
}

// ══ DATA ══
let materials = [
  {id:1,name:'木屑',stock:500,unit:'公斤',order:300,note:''},
  {id:2,name:'米糠',stock:80,unit:'公斤',order:200,note:''},
  {id:3,name:'石灰',stock:45,unit:'公斤',order:100,note:'需注意存放'},
  {id:4,name:'太空包',stock:1200,unit:'個',order:1000,note:''},
  {id:5,name:'棉花塞',stock:3000,unit:'個',order:2000,note:''},
  {id:6,name:'酒精',stock:10,unit:'公升',order:30,note:'易揮發需密封'},
];
let matSeq = materials.length;

let productions = [
  {id:1,warehouse:'A棟',variety:'柳松菇',openDate:'2025-07-01',bags:200,mushroom:420,gradeA:180,gradeB:60,pack200:120,organic200:80,note:''},
  {id:2,warehouse:'B棟',variety:'鴻喜菇',openDate:'2025-07-20',bags:100,mushroom:0,gradeA:0,gradeB:0,pack200:0,organic200:0,note:'進行中'},
];
let prodSeq = productions.length;

let bagRecords = [
  {id:1,variety:'柳松菇',packDate:'2025-06-01',inocuDate:'2025-06-08',qty:500,note:''},
  {id:2,variety:'鴻喜菇',packDate:'2025-06-15',inocuDate:'2025-06-22',qty:300,note:''},
  {id:3,variety:'柳松菇',packDate:'2025-07-10',inocuDate:'2025-07-17',qty:400,note:'第二批'},
];
let bagSeq = bagRecords.length;
let eM=null,eP=null,eB=null;

// ══ UTILS ══
function today(){return new Date().toISOString().slice(0,10);}
function fmt(v){return(v===''||v==null)?'—':v;}
function fifo(variety){
  const bags=bagRecords.filter(b=>b.variety===variety).sort((a,b)=>a.packDate.localeCompare(b.packDate));
  let used=productions.filter(p=>p.variety===variety).reduce((s,p)=>s+(+p.bags||0),0);
  return bags.map(b=>{const u=Math.min(b.qty,used);used=Math.max(0,used-u);return{id:b.id,used:u,remain:b.qty-u};});
}

// ══ TABS ══
function switchTab(t){
  ['overview','material','production','bagmaking'].forEach(k=>{
    document.getElementById('panel-'+k).classList.toggle('active',k===t);
    document.getElementById('tab-'+k).classList.toggle('active',k===t);
  });
  if(t==='overview')renderOv();
  if(t==='material')renderMat();
  if(t==='production')renderProd();
  if(t==='bagmaking')renderBag();
}

// ══ OVERVIEW ══
function renderOv(){
  const tM=bagRecords.reduce((s,r)=>s+r.qty,0);
  const tU=productions.reduce((s,r)=>s+r.bags,0);
  const tL=Math.max(0,tM-tU);
  document.getElementById('ov-cards').innerHTML=`
    <div class="card"><div class="card-lbl">TOTAL MATERIALS</div><div class="card-val">${materials.length}<span class="cu">種</span></div><div class="card-sub">管理中</div></div>
    <div class="card"><div class="card-lbl">制包總量</div><div class="card-val">${tM}<span class="cu">包</span></div><div class="card-sub">${bagRecords.length} 批次</div></div>
    <div class="card"><div class="card-lbl">已用於生產</div><div class="card-val c">${tU}<span class="cu">包</span></div><div class="card-sub">${productions.length} 筆</div></div>
    <div class="card cg"><div class="card-lbl">剩餘可用</div><div class="card-val g">${tL}<span class="cu">包</span></div><div class="card-sub">未投入生產</div></div>
  `;
  document.getElementById('inv-list').innerHTML=materials.map(m=>{
    const pct=Math.min((m.stock/500)*100,100);
    return`<div class="inv-row">
      <div class="inv-name">${m.name}</div>
      <div class="inv-bar-wrap"><div class="inv-bar-bg"><div class="inv-bar-fill fg" style="width:${pct}%"></div></div></div>
      <div class="inv-nums"><span>${m.stock} ${m.unit}</span></div>
    </div>`;
  }).join('')||'<div class="empty-state"><div class="empty-icon">◻</div>尚無資料</div>';
}

// ══ MATERIAL ══
function renderMat(){
  const q=(document.getElementById('mat-search')?.value||'').toLowerCase();
  const rows=materials.filter(m=>m.name.toLowerCase().includes(q));
  const tb=document.getElementById('mat-tbody');
  if(!rows.length){tb.innerHTML='<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">▦</div>無符合資料</div></td></tr>';return;}
  tb.innerHTML=rows.map((m,i)=>`<tr>
    <td class="mn">${i+1}</td><td><b>${m.name}</b></td>
    <td class="mn">${m.stock}</td><td class="mn">${m.unit}</td>
    <td class="mn" style="color:var(--cyan)">${m.order}</td>
    <td class="mn" style="color:var(--green);font-weight:700">${m.stock+m.order}</td>
    <td><span class="bdg bdg-g">正常</span></td>
    <td style="color:var(--tx3);font-size:.8rem">${m.note||'—'}</td>
    <td><div style="display:flex;gap:.3rem">
      <button class="btn btn-g btn-sm" onclick="openMatModal(${m.id})">✏️ 編輯</button>
      <button class="btn btn-d btn-sm" onclick="delMat(${m.id})">刪除</button>
    </div></td>
  </tr>`).join('');
}
function openMatModal(id=null){
  eM=id;
  if(id){const m=materials.find(x=>x.id===id);document.getElementById('m-title').textContent='編輯原物料';document.getElementById('m-name').value=m.name;document.getElementById('m-stock').value=m.stock;document.getElementById('m-unit').value=m.unit;document.getElementById('m-order').value=m.order;document.getElementById('m-note').value=m.note;}
  else{document.getElementById('m-title').textContent='新增原物料';['m-name','m-stock','m-order','m-note'].forEach(x=>document.getElementById(x).value='');document.getElementById('m-unit').value='公斤';}
  document.getElementById('modal-mat').classList.add('show');
}
function saveMat(){
  const name=document.getElementById('m-name').value.trim();if(!name)return alert('請輸入名稱');
  const o={id:eM||++matSeq,name,stock:+(document.getElementById('m-stock').value)||0,unit:document.getElementById('m-unit').value,order:+(document.getElementById('m-order').value)||0,note:document.getElementById('m-note').value.trim()};
  if(eM){const i=materials.findIndex(x=>x.id===eM);materials[i]=o;}else materials.push(o);
  closeModal('modal-mat');renderMat();renderOv();
}
function delMat(id){if(!confirm('確定刪除？'))return;materials=materials.filter(x=>x.id!==id);renderMat();renderOv();}

// ══ PRODUCTION ══
function renderProd(){
  const q=(document.getElementById('prod-search')?.value||'').toLowerCase();
  const rows=productions.filter(p=>p.variety.toLowerCase().includes(q)||((p.warehouse||'').toLowerCase().includes(q)));
  const tb=document.getElementById('prod-tbody');
  if(!rows.length){tb.innerHTML='<tr><td colspan="12"><div class="empty-state"><div class="empty-icon">▶</div>無符合資料</div></td></tr>';return;}
  tb.innerHTML=rows.map((p,i)=>`<tr>
    <td class="mn">${i+1}</td>
    <td style="color:var(--cyan);font-weight:600">${p.warehouse||'—'}</td>
    <td><b>${p.variety}</b></td>
    <td class="mn">${fmt(p.openDate)}</td>
    <td class="mn" style="color:var(--cyan)">${p.bags}</td>
    <td class="mn">${p.mushroom||'—'}</td><td class="mn">${p.gradeA||'—'}</td>
    <td class="mn">${p.gradeB||'—'}</td><td class="mn">${p.pack200||'—'}</td>
    <td class="mn">${p.organic200||'—'}</td>
    <td style="color:var(--tx3);font-size:.8rem">${p.note||'—'}</td>
    <td><div style="display:flex;gap:.3rem">
      <button class="btn btn-g btn-sm" onclick="openProdModal(${p.id})">✏️</button>
      <button class="btn btn-d btn-sm" onclick="delProd(${p.id})">刪除</button>
    </div></td>
  </tr>`).join('');
}
function openProdModal(id=null){
  eP=id;
  if(id){
    const p=productions.find(x=>x.id===id);
    document.getElementById('p-title').textContent='編輯生產紀錄';
    document.getElementById('p-warehouse').value=p.warehouse||'';
    document.getElementById('p-variety').value=p.variety;
    document.getElementById('p-open').value=p.openDate;
    document.getElementById('p-bags').value=p.bags;document.getElementById('p-mush').value=p.mushroom;
    document.getElementById('p-a').value=p.gradeA;document.getElementById('p-b').value=p.gradeB;
    document.getElementById('p-200').value=p.pack200;document.getElementById('p-org').value=p.organic200;
    document.getElementById('p-note').value=p.note;
  }else{
    document.getElementById('p-title').textContent='新增生產紀錄';
    ['p-warehouse','p-variety','p-bags','p-mush','p-a','p-b','p-200','p-org','p-note'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('p-open').value=today();
  }
  document.getElementById('modal-prod').classList.add('show');
}
function saveProd(){
  const variety=document.getElementById('p-variety').value.trim();if(!variety)return alert('請輸入品種');
  const o={id:eP||++prodSeq,warehouse:document.getElementById('p-warehouse').value.trim(),variety,openDate:document.getElementById('p-open').value,bags:+(document.getElementById('p-bags').value)||0,mushroom:+(document.getElementById('p-mush').value)||0,gradeA:+(document.getElementById('p-a').value)||0,gradeB:+(document.getElementById('p-b').value)||0,pack200:+(document.getElementById('p-200').value)||0,organic200:+(document.getElementById('p-org').value)||0,note:document.getElementById('p-note').value.trim()};
  if(eP){const i=productions.findIndex(x=>x.id===eP);productions[i]=o;}else productions.push(o);
  closeModal('modal-prod');renderProd();
}
function delProd(id){if(!confirm('確定刪除？'))return;productions=productions.filter(x=>x.id!==id);renderProd();}

// ══ BAG MAKING ══
function renderBag(){
  const q=(document.getElementById('bag-search')?.value||'').toLowerCase();
  const rows=bagRecords.filter(b=>b.variety.toLowerCase().includes(q));
  const tb=document.getElementById('bag-tbody');
  const fm={};
  [...new Set(bagRecords.map(b=>b.variety))].forEach(v=>fifo(v).forEach(f=>{fm[f.id]=f;}));
  if(!rows.length){tb.innerHTML='<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">◈</div>無符合資料</div></td></tr>';return;}
  tb.innerHTML=rows.map((b,i)=>{
    const f=fm[b.id]||{used:0,remain:b.qty};
    const pct=b.qty?Math.min((f.used/b.qty)*100,100):0;
    const rc=f.remain===0?'rem-zero':f.remain<b.qty*.2?'rem-warn':'rem-ok';
    return`<tr>
      <td class="mn">${i+1}</td><td><b>${b.variety}</b></td>
      <td class="mn">${fmt(b.packDate)}</td><td class="mn">${fmt(b.inocuDate)}</td>
      <td class="mn" style="color:var(--cyan);font-weight:700">${b.qty}</td>
      <td><div style="display:flex;align-items:center;gap:.5rem">
        <span class="mn" style="color:var(--amber)">${f.used}</span>
        <div class="prog-bar" style="width:4.5rem"><div class="prog-fill fa" style="width:${pct}%"></div></div>
      </div></td>
      <td><span class="rem ${rc}">${f.remain} 包</span></td>
      <td style="color:var(--tx3);font-size:.8rem">${b.note||'—'}</td>
      <td><div style="display:flex;gap:.3rem">
        <button class="btn btn-g btn-sm" onclick="openBagModal(${b.id})">✏️</button>
        <button class="btn btn-d btn-sm" onclick="delBag(${b.id})">刪除</button>
      </div></td>
    </tr>`;
  }).join('');
  const tM=bagRecords.reduce((s,r)=>s+r.qty,0);
  const tU=productions.reduce((s,p)=>s+p.bags,0);
  document.getElementById('flow-stats').innerHTML=`
    <div><div class="fsv" style="color:var(--cyan)">${tM}</div><div class="fsl">制包總量</div></div>
    <div><div class="fsv" style="color:var(--amber)">${tU}</div><div class="fsl">已生產</div></div>
    <div><div class="fsv" style="color:var(--green)">${Math.max(0,tM-tU)}</div><div class="fsl">剩餘可用</div></div>
  `;
}
function openBagModal(id=null){
  eB=id;
  if(id){const b=bagRecords.find(x=>x.id===id);document.getElementById('b-title').textContent='編輯制包紀錄';document.getElementById('b-variety').value=b.variety;document.getElementById('b-qty').value=b.qty;document.getElementById('b-pack').value=b.packDate;document.getElementById('b-inocu').value=b.inocuDate;document.getElementById('b-note').value=b.note;}
  else{document.getElementById('b-title').textContent='新增制包紀錄';['b-variety','b-qty','b-inocu','b-note'].forEach(x=>document.getElementById(x).value='');document.getElementById('b-pack').value=today();}
  document.getElementById('modal-bag').classList.add('show');
}
function saveBag(){
  const variety=document.getElementById('b-variety').value.trim();if(!variety)return alert('請輸入品種');
  const o={id:eB||++bagSeq,variety,qty:+(document.getElementById('b-qty').value)||0,packDate:document.getElementById('b-pack').value,inocuDate:document.getElementById('b-inocu').value,note:document.getElementById('b-note').value.trim()};
  if(eB){const i=bagRecords.findIndex(x=>x.id===eB);bagRecords[i]=o;}else bagRecords.push(o);
  closeModal('modal-bag');renderBag();
}
function delBag(id){if(!confirm('確定刪除？'))return;bagRecords=bagRecords.filter(x=>x.id!==id);renderBag();}

// ══ MODAL ══
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show');});});

// ══ CLOCK ══
function tick(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleDateString('zh-TW')+' '+n.toLocaleTimeString('zh-TW');}
setInterval(tick,1000);tick();

renderOv();
</script>
</body>
</html>
